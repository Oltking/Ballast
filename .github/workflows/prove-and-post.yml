name: Prove & post solvency attestation

# Manual-only: produces a REAL Groth16 solvency proof on a free x86_64 Linux
# runner (with Docker) and posts it to the testnet vault. The arm64 Mac can't do
# the snark wrap; this runner can. Trigger from the Actions tab → "Run workflow".
#
# Requires one repo secret: SOURCE_ACCOUNT_SECRET (the vault's funded
# admin/operator S... key). GitHub encrypts it and masks it in logs.
#
# Heads-up: the snark step is RAM-hungry and the free runner is 16 GB — it may be
# tight. If it OOMs, the alternative is a 32 GB VM (see scripts/PROVE_ON_VM.md).

on:
  workflow_dispatch:
    inputs:
      balances:
        description: "Private book: comma-separated STROOP balances (blank = single leaf == net_custodied)"
        required: false
        default: ""
  # Operator auto-proves solvency twice a day so the on-chain attestation stays
  # fresh (staleness window ~17280 ledgers ≈ 24h). The script binds each proof to
  # live reserves/net_custodied, so it tracks deposits automatically.
  schedule:
    - cron: "0 */12 * * *"

jobs:
  prove-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Show host (must be x86_64, Docker present)
        run: |
          uname -m
          docker version
          free -h

      - name: Install RISC Zero toolchain (pinned to the guest's 3.0.5)
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"
          "$HOME/.risc0/bin/rzup" install rust
          "$HOME/.risc0/bin/rzup" install r0vm 3.0.5
          "$HOME/.risc0/bin/rzup" install cpp || true

      - name: System deps for the Stellar CLI (libdbus / libudev / pkg-config)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Prove & post
        env:
          VAULT_CONTRACT_ID: CAULRHZ5WKYXHQJTF3BC3AV4QHOIEPDN5LIGDBWS6UOJ76YLLPT3VONR
          VAULT_DOMAIN: 28b89f3db2b173c1332ec22d82bc81dc823c6dead06186d2f51c9ffb0b5be7ba
          SOURCE_ACCOUNT_SECRET: ${{ secrets.SOURCE_ACCOUNT_SECRET }}
          BALANCES: ${{ inputs.balances }}
          # If set, the prover pulls the REAL private book from the custodian
          # backend instead of a synthetic one. Unset → synthetic fallback.
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          PROVER_TOKEN: ${{ secrets.PROVER_TOKEN }}
          RISC0_DEV_MODE: "0"
          REPIN: "1" # admin re-pin to the freshly built image so the proof always verifies
        run: bash scripts/prove_and_post.sh

      - name: Upload proof artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof_chain
          path: proof_chain.txt
          if-no-files-found: ignore
